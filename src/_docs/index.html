<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cosaf Sample</title>
<meta name="description" content="Sample of Cosaf">
<meta name="author" content="">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
<script src="index.ts" type="module"></script>
</head>
<body>
	<header>
		<h1>Cosaf</h1>
	</header>

	<main>
		<section class="controls" aria-label="Controls">
			<div class="editors-wrapper">
				<div class="row">
					<button id="add-color" type="button">+</button>
				</div>

				<div id="editors" class="editors"></div>
			</div>

			<fieldset>
				<legend>View</legend>
				<label><input type="radio" name="vision" value="T" checked> Trichromacy</label>
				<label><input type="radio" name="vision" value="P"> Protanopia</label>
				<label><input type="radio" name="vision" value="D"> Deuteranopia</label>
				<label><input type="radio" name="vision" value="M"> Monochromacy</label>
			</fieldset>
		</section>

		<section id="schemes" class="schemes" aria-label="Color schemes"></section>

		<aside>
			<div class="solver-options">
				<span class="switchable"><label><input type="checkbox" id="target-on" checked> Target:</label> <input id="target" type="number" min="0.1" max="1" step="0.1"></span>
				<span class="switchable"><label><input type="checkbox" id="time-limit-on" checked> Time limit:</label> <input id="time-limit" type="number" min="100" max="10000"></span>
				<label><input type="checkbox" id="bn-on"> Resolve bottleneck</label>
				<label><input type="checkbox" id="debug-on" checked> Debug mode</label>
			</div>
		</aside>

		<section class="controls" aria-label="Controls">
			<div class="row">
				<button id="adjust" type="button">Adjust</button>
				<button id="stop" type="button" disabled>Stop</button>
				<p id="message" class="message"></p>
			</div>

			<textarea id="output" rows="24"></textarea>
		</section>
	</main>
</body>

</html>
